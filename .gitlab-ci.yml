# ramgate CI -- very basic secret + PII scanning.
# Secrets: GitLab-native Secret Detection template (runs gitleaks).
# PII:     shared scanner (scripts/ci/scan.bash), email allowlist check.

include:
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - test

pii-scan:
  stage: test
  image: alpine:3.20
  before_script:
    - apk add --no-cache bash git grep
  script:
    - bash scripts/ci/scan.bash --pii-only
