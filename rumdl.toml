# rumdl config. LLM-first markdown: long lines allowed (190), tables/HTML allowed.
# Enforced by the `rumdl` prek hook (`rumdl check`).

exclude = ["var/", ".just/state/", ".omc/"]

[MD013]
# LLM-optimized: 190 chars/line saves wrap tokens; code blocks/tables/URLs exempt.
line_length = 190
code_blocks = false
tables = false

[MD024]
siblings_only = true

[MD033]
enabled = false

[MD041]
enabled = false
